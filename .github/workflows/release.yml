name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13          # Intel runner — last one GitHub provides
          - target: aarch64-apple-darwin
            os: macos-14          # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p drift-ai
          else
            cargo build --release --target ${{ matrix.target }} -p drift-ai
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin=drift
          asset="drift-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${bin}" "dist/${bin}"
          cp README.md LICENSE CHANGELOG.md "dist/"
          cd dist
          tar czf "../${asset}.tar.gz" "${bin}" README.md LICENSE CHANGELOG.md
          cd ..
          shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ matrix.target }}
          path: |
            drift-*.tar.gz
            drift-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect into flat dist/
        run: |
          mkdir -p flat
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} flat/ \;

      - name: Collect sha256 outputs
        id: sha256
        run: |
          set -euo pipefail
          cd flat
          read_sha() {
            local f="drift-${GITHUB_REF_NAME}-$1.tar.gz.sha256"
            [ -f "$f" ] && awk '{print $1}' "$f" || echo ""
          }
          {
            echo "linux_x86=$(read_sha x86_64-unknown-linux-gnu)"
            echo "linux_arm=$(read_sha aarch64-unknown-linux-gnu)"
            echo "macos_x86=$(read_sha x86_64-apple-darwin)"
            echo "macos_arm=$(read_sha aarch64-apple-darwin)"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: flat/*
          draft: false
          prerelease: false
          body: |
            See [CHANGELOG.md](https://github.com/ShellFans-Kirin/drift_ai/blob/main/CHANGELOG.md) for the full set of changes.

            ### Install from a pre-built binary

            ```bash
            # Linux x86_64 — swap the target suffix for macos-aarch64 etc.
            curl -sSfL https://github.com/ShellFans-Kirin/drift_ai/releases/download/${{ github.ref_name }}/drift-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz \
              | tar xz -C /tmp
            sudo mv /tmp/drift /usr/local/bin/drift
            drift --version
            ```

            Targets shipped: Linux x86_64 / aarch64, macOS x86_64 / aarch64.

      - name: Dispatch tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_REPO_PAT }}
          repository: ShellFans-Kirin/homebrew-drift
          event-type: drift-released
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "tag": "${{ github.ref_name }}",
              "sha256": {
                "x86_64-unknown-linux-gnu": "${{ steps.sha256.outputs.linux_x86 }}",
                "aarch64-unknown-linux-gnu": "${{ steps.sha256.outputs.linux_arm }}",
                "x86_64-apple-darwin": "${{ steps.sha256.outputs.macos_x86 }}",
                "aarch64-apple-darwin": "${{ steps.sha256.outputs.macos_arm }}"
              }
            }
