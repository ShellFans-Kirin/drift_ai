name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace

      - name: test (ignored / smoke)
        run: cargo test --workspace -- --ignored

      - name: build release
        run: cargo build --workspace --release

      - name: quickstart smoke (Linux only)
        if: runner.os == 'Linux'
        run: |
          rm -rf /tmp/drift-smoke && mkdir -p /tmp/drift-smoke
          cd /tmp/drift-smoke
          git init -q
          git config user.email "ci@drift.test"
          git config user.name "drift-ci"
          ${GITHUB_WORKSPACE}/target/release/drift init
          ${GITHUB_WORKSPACE}/target/release/drift --version
